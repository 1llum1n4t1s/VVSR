<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promo Small - 440x280</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      height: 280px;
      background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .decorative-circles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .circle1 { width: 180px; height: 180px; top: -60px; left: -60px; }
    .circle2 { width: 140px; height: 140px; bottom: -40px; right: -40px; }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }

    .logo { font-size: 48px; margin-bottom: 10px; }

    .main-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 11px;
      opacity: 0.9;
      margin-bottom: 16px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .badges-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .badge-icon { font-size: 12px; }

    .version-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="decorative-circles">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
  </div>

  <div class="version-badge">v1.0.6</div>

  <div class="content">
    <div class="logo">🎬</div>
    <h1 class="main-title">VideoSR Assist</h1>
    <p class="subtitle">RTX Video Super Resolution を有効化</p>

    <div class="badges-container">
      <div class="badge">
        <span class="badge-icon">🎥</span>
        <span>自動検出</span>
      </div>
      <div class="badge">
        <span class="badge-icon">⚡</span>
        <span>RTX VSR</span>
      </div>
      <div class="badge">
        <span class="badge-icon">🖥️</span>
        <span>60+</span>
      </div>
      <div class="badge">
        <span class="badge-icon">🔄</span>
        <span>ON/OFF</span>
      </div>
    </div>
  </div>

</body>
</html>
