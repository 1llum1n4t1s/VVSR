<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot 1 - Feature Overview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 800px;
      background: linear-gradient(135deg, #f0f4ff 0%, #dbe4f0 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .browser-mockup {
      width: 960px;
      height: 620px;
      background: #000;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      position: relative;
    }

    .browser-header {
      height: 40px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .browser-dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28ca42; }

    .browser-url {
      flex: 1;
      height: 24px;
      background: #0d0d1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      color: #888;
      margin-left: 12px;
    }

    .browser-content {
      height: calc(100% - 40px);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Fake video player */
    .video-player {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .video-scene {
      width: 80%;
      height: 70%;
      background: linear-gradient(180deg, #1a2a4a 0%, #2a3a5a 30%, #3a4a6a 60%, #1a3a3a 100%);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .video-scene::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 15%;
      width: 70%;
      height: 40%;
      background: linear-gradient(135deg, rgba(100,150,200,0.15), rgba(60,100,160,0.1));
      border-radius: 50%;
      filter: blur(20px);
    }

    /* Play button */
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.2);
    }

    .play-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 12px 0 12px 22px;
      border-color: transparent transparent transparent rgba(255,255,255,0.8);
      margin-left: 4px;
    }

    /* Video progress bar */
    .video-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      align-items: flex-end;
      padding: 0 16px 8px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      position: relative;
    }

    .progress-fill {
      width: 35%;
      height: 100%;
      background: #e50914;
      border-radius: 2px;
    }

    /* VSR Overlay indicator */
    .vsr-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 200, 160, 0.2);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(0, 255, 200, 0.3);
    }

    .vsr-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ffbb;
      box-shadow: 0 0 8px #00ffbb;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .vsr-text {
      color: #00ffdd;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Extension popup */
    .extension-popup {
      position: absolute;
      top: 50px;
      right: -280px;
      width: 260px;
      background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 20px;
      color: white;
    }

    .popup-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .popup-icon { font-size: 36px; margin-bottom: 8px; }
    .popup-title { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }

    .popup-status {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .popup-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    .popup-status-text { font-size: 13px; font-weight: 600; }

    .popup-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .popup-feat {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .popup-feat-icon { display: block; font-size: 20px; margin-bottom: 4px; }
    .popup-feat-text { font-size: 10px; font-weight: 600; }

    .popup-version {
      text-align: center;
      margin-top: 12px;
      font-size: 10px;
      opacity: 0.6;
    }

    /* Labels */
    .label-vsr {
      position: absolute;
      bottom: 80px;
      right: -260px;
      color: #666;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label-arrow {
      width: 60px;
      height: 2px;
      background: #999;
      position: relative;
    }

    .label-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -4px;
      border-style: solid;
      border-width: 5px 0 5px 8px;
      border-color: transparent transparent transparent #999;
    }

    .watermark {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(0, 0, 0, 0.25);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="browser-mockup">
    <div class="browser-header">
      <div class="browser-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="browser-url">https://www.netflix.com/watch/...</div>
    </div>
    <div class="browser-content">
      <div class="video-player">
        <div class="video-scene">
          <div class="play-btn"></div>
        </div>
        <div class="vsr-indicator">
          <div class="vsr-dot"></div>
          <span class="vsr-text">VSR Active</span>
        </div>
        <div class="video-controls">
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="extension-popup">
    <div class="popup-header">
      <div class="popup-icon">🎬</div>
      <div class="popup-title">VideoSR Assist</div>
    </div>
    <div class="popup-status">
      <div class="popup-status-row">
        <div class="popup-status-dot"></div>
        <span class="popup-status-text">VSR 有効</span>
      </div>
    </div>
    <div class="popup-features">
      <div class="popup-feat">
        <span class="popup-feat-icon">🎥</span>
        <span class="popup-feat-text">自動検出</span>
      </div>
      <div class="popup-feat">
        <span class="popup-feat-icon">⚡</span>
        <span class="popup-feat-text">RTX VSR</span>
      </div>
      <div class="popup-feat">
        <span class="popup-feat-icon">🖥️</span>
        <span class="popup-feat-text">窓モード対応</span>
      </div>
      <div class="popup-feat">
        <span class="popup-feat-icon">🔄</span>
        <span class="popup-feat-text">ON/OFF</span>
      </div>
    </div>
    <div class="popup-version">v1.0.4</div>
  </div>

  <div class="watermark">VideoSR Assist — RTX Video Super Resolution</div>

  <script>
  (() => {
    const lang = new URLSearchParams(location.search).get('lang') || 'ja';
    if (lang !== 'en') return;
    document.documentElement.lang = 'en';
    [
      ['.popup-status-text', 'VSR Active'],
      ['.popup-feat:nth-child(1) .popup-feat-text', 'Auto Detect'],
      ['.popup-feat:nth-child(3) .popup-feat-text', 'Windowed'],
    ].forEach(([sel, text]) => {
      const el = document.querySelector(sel);
      if (el) el.textContent = text;
    });
  })();
  </script>
</body>
</html>
